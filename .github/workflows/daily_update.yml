name: Daily D10 Score Update

on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write       # needed to commit data files back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily score
        env:
          CRYPTOQUANT_KEY: ${{ secrets.CRYPTOQUANT_KEY }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
        run: python d10_daily_score.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/combo_history.csv data/signals_today.json data/metrics.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily D10 score update $(date -u '+%Y-%m-%d')"
          git push